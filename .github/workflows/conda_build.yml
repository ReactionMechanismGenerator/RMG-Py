name: Conda Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - stable
jobs:
  build:
    # Timeout to avoid waisting the default 6-hour runner allotment.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest]
        numpy-version: ["1.26"]
        python-version: ["3.9", "3.10", "3.11"]
        is_pr: ["${{ contains(github.event_name, 'pull_request') }}"]
        exclude:
        # for PRs just run a single build per platform to save time and resources
          - is_pr: true
            os: ubuntu-latest
            python-version: "3.9"
          - is_pr: true
            os: ubuntu-latest
            python-version: "3.10"
          - is_pr: true
            os: macos-15-intel
            python-version: "3.9"
          - is_pr: true
            os: macos-15-intel
            python-version: "3.10"
          - is_pr: true
            os: macos-latest
            python-version: "3.9"
          - is_pr: true
            os: macos-latest
            python-version: "3.10"
    runs-on: ${{ matrix.os }}
    name: Conda Build ${{ matrix.os }} Python ${{ matrix.python-version }} Numpy ${{ matrix.numpy-version }}
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          auto-update-conda: true
          show-channel-urls: true
          conda-remove-defaults: "true"
          auto-activate: true
          activate-environment: ""

      - name: Install Build Tools
        run: conda install -y python anaconda-client conda-build

      - name: Show solver and runner info
        # Small diagnostic snapshot.
        run: |
          conda info
          conda config --show-sources
          conda list -n base | sed -n '1,40p'
          uname -a
          sysctl hw.memsize hw.ncpu hw.physicalcpu 2>/dev/null || cat /proc/meminfo 2>/dev/null | head -3 || true

      - name: Configure Auto-upload
        if: >
          (github.event_name == 'push' && github.ref == 'refs/heads/stable') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/stable')
        run: |
          conda config --set anaconda_upload yes

      - name: Build Binary
        env:
          CONDA_VERBOSITY: "1"
        run: |
          # set a default value to the conda_token if needed (like from forks)
          : "${CONDA_TOKEN:=${{ secrets.ANACONDA_TOKEN }}}"
          : "${CONDA_TOKEN:=default_value}"
          echo "CONDA_TOKEN=$CONDA_TOKEN" >> $GITHUB_ENV
          conda config --add channels rmg
          conda config --add channels conda-forge
          # --add prepends, so the final channel order is [conda-forge, rmg, ...].
          # Strict priority makes the solver skip lower-priority channels entirely
          # for any package the higher-priority channel offers.
          conda config --set channel_priority strict
          CONDA_NPY=${{ matrix.numpy-version }} CONDA_PY=${{ matrix.python-version }} conda build --token $CONDA_TOKEN --user rmg .

  result:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Conda Build Results
    needs: [build]
    steps:
      - run: exit 1
        # see https://github.com/orgs/community/discussions/26822?sort=new#discussioncomment-8285141
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
